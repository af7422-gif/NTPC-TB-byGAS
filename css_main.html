<!-- 主頁面CSS -->
<style>
html, body{
  height:100%;
  margin:0;
  font-family:"Microsoft JhengHei";
}

body.main-body{
  background-color:#F0F2F5 !important;
  background-image:
  linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
  linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);

  background-size:20px 20px;
}
/* ===== Header ===== */

.header-bar{
  background:#1B4965;
  color:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
  position:relative;
  z-index:10;
  border: none;
}
.spacer {
  height: 20px; 
  flex-shrink: 0; /* 確保不會被擠壓 */
}
.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
}

.header-title{
  font-size:25px;
  font-weight:700;
  letter-spacing:1.5px;
  margin:0;
}

/* 左側標題區 */

.header-brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.header-icon{
  width:28px;
  height:28px;
  color:#62B6CB;
}

/* ===== Header 右側區域 ===== */

.header-actions{
  display:flex;
  align-items:center;
  gap:16px;
}

/* ===== 使用者資訊 ===== */

.user-info{
  font-size: 14px;
  border-left: 1px solid #2C6285;
  padding-left: 14px;
  margin-right: 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  color: #d6dde3;
}
.user-info span{
  color:white;
  font-weight:500;
}

/* ===== 按鈕群 ===== */

.header-btn-group{
  display:flex;
  gap:6px;
}

/* ===== 基本按鈕 ===== */

.btn-header{
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  font-size: 18px;
  border-radius: 8px;
  transition: 0.2s;
  border: none;
  font-weight: bold;
}

/* ===== 次要按鈕 ===== */

.btn-soft{
  background:#2C6285;
  color:#dce6ec;
}

.btn-soft:hover{
  background:#62B6CB;
  color:white;
}

/* ===== Excel 按鈕 ===== */

.btn-excel{
  background:#62B6CB;
  color:white;
  font-weight:bold;
}

.btn-excel:hover{
  background:#4a98ac;
}

/* ===== 主操作按鈕 ===== */

.btn-main{
  background:#ffa07a;
  color:white;
  font-weight:700;
  padding:6px 16px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.btn-main:hover{
  background:#ff8c69;
}

/* ===== icon ===== */

.icon-sm{
  width:18px;
  height:18px;
}

.icon-md{
  width:28px;
  height:28px;
}

/* ===== 通知按鈕 ===== */

.btn-icon{
  position:relative;
  padding:6px;
  background:none;
  border:none;
  color:#dce6ec;
  cursor:pointer;
}

.btn-icon:hover{
  color:white;
}

/* ===== 登出按鈕 ===== */

.btn-outline{
  border:1px solid gray;
  color:#cfd8de;
  background:none;
}

.btn-outline:hover {
  background-color: gray;
}

/* ===== 通知紅點 ===== */

.notify-dot {
  position: absolute;
  top: 3px;
  right: 3px;
  width: 8px;
  height: 8px;
  background: red;
  border-radius: 50%;
  
  /* 套用發光縮放動畫 */
  animation: glow-scale 1.5s infinite ease-in-out;
}

/* 定義發光 + 縮放動畫 */
@keyframes glow-scale {
  0% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); /* 初始無光暈 */
  }
  50% {
    transform: scale(1.4); /* 變大 */
    /* 這裡設定光暈：水平 0, 垂直 0, 模糊 10px, 擴散 4px */
    box-shadow: 0 0 10px 4px rgba(255, 0, 0, 0.7); 
  }
  100% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); /* 回到無光暈 */
  }
}

/* ===== 主容器 ===== */

.case-container {
  width: 95%;
  margin: 30px auto;
  background: white;
  border-radius: 12px;
  border: 1px solid #ffffff;
  box-shadow: 0 8px 24px rgb(117 117 117 / 50%);
  padding: 28px;
  overflow: hidden;
}


/* ===== 標題列 ===== */

.case-header{
  display:flex;
  align-items:center;
  height:64px;
  position:relative;
}


/* ===== 警告標語 ===== */

.case-warning{
  color:#b71c1c;
  font-weight:bold;
  font-size:1.09rem;
  background:#fff6ed;
  border-radius:10px;
  padding:7px 18px 7px 16px;
  margin-right:30px;
  letter-spacing:2px;
  border:1.5px solid #f7a17a;
  display:flex;
  align-items:center;
  min-width:320px;
  z-index:1;
}

.case-warning img{
  margin-right:8px;
  width:20px;
  height:20px;
}


/* ===== 標題 ===== */

.case-title{
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  margin: 0;
  font-size: 2.2rem;
  text-align: center;
  width: max-content;
  z-index: 2;
  color: #6d6d6d;
  font-weight: 1000;
}


/* ===== filter bar ===== */

.filter-bar{
  background:#f3f5f7;
  border-radius:14px;
  padding:14px 22px;
  border:1px solid #e1e5ea;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  margin-bottom:20px;
}

/* 標籤 */
.filter-label{
  font-size:1.15rem;
  font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;
  font-weight:700;
  letter-spacing:0.5px;
  color:#6B7280;
}
.filter-bar label{
  margin-right:6px;
  color:#ff9800;
}

/* 下拉 */
.filter-bar select.form-select {
  border-radius: 8px;
  min-width: 90px;
  font-size: 1.02rem;
  display: inline-block;
}

/* hover */
.filter-bar select.form-select:hover{
  border-color:#5fa7c6;
}

/* focus */
.filter-bar select.form-select:focus{
  border-color:#2f6b87;
  box-shadow:0 0 0 2px rgba(95,167,198,0.25);
}

// 搜尋框
.form-control-sm {
    font-size: 1rem;
}

/* ===== 清除篩選按鈕 ===== */
.btn-clear-filter{
  font-size:1.9rem;
  color:#ff9800;
  margin-left:24px;
  background:none;
  border:none;
  cursor:pointer;
}

/* ===== case count ===== */
.case-count{
  font-size:1.3rem;
  color:#335f74;
  font-weight:600;
  margin-bottom:12px;
}


/* ===== 銷案清單table area ===== */
th, td {
  text-align: center;
}

#tableArea-area{
  margin-bottom:16px;
}

/* === 銷案清單表格 === */
#tableArea table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
  background-color: white;
  border: 1px solid #ccc; /* 外框 */
}

#tableArea table th,
#tableArea table td {
  border: 1px solid #ccc; /* 內外框線統一 */
  padding: 12px;
  text-align: center;
}

#tableArea table th {
  background-color: #f0f0f0; /* 標題列背景改這裡 */
  text-align: center !important;
}

/* 依照 displayColumns 順序設定（管理單位, 申請時間, ...） */
#tableArea table th:nth-child(1), #tableArea table td:nth-child(1) { width: 100px; } //管理單位
#tableArea table th:nth-child(2), #tableArea table td:nth-child(2) { width: 150px; } //申請時間
#tableArea table th:nth-child(3), #tableArea table td:nth-child(3) { width: 90px; } //個案類型
#tableArea table th:nth-child(4), #tableArea table td:nth-child(4) { width: 110px; } //總編號
#tableArea table th:nth-child(5), #tableArea table td:nth-child(5) { width: 110px; } //個案姓名
#tableArea table th:nth-child(6), #tableArea table td:nth-child(6) { width: 120px; } //結束治療日
#tableArea table th:nth-child(7), #tableArea table td:nth-child(7) { width: 130px; } //銷案原因
#tableArea table th:nth-child(8), #tableArea table td:nth-child(8) { width: 120px; } //銷案期限
#tableArea table th:nth-child(9), #tableArea table td:nth-child(9) { width: 110px; } //審核狀態

/* 隔行顏色（奇偶行） */
#tableArea table tbody tr:nth-child(odd) {
  background: #f8f8fa;
}
#tableArea table tbody tr:nth-child(even) {
  background: #fff;
}
/* 滑鼠移上高亮 */
#tableArea table tbody tr:hover {
  background: #fff3e0 !important;
}
/* 表頭樣式與排序箭頭 */
#tableArea th.sortable {
  cursor: pointer;
  position: relative;
  user-select: none;
}
#tableArea th.sortable:after {
  content: '';
  display: inline-block;
  margin-left: 6px;
  border-width: 5px 4px 0 4px;
  border-style: solid;
  border-color: #bbb transparent transparent transparent;
  vertical-align: middle;
}
#tableArea th.sortable.sorted-asc:after {
  border-width: 0 4px 5px 4px;
  border-color: transparent transparent #ffa07a transparent;
}
#tableArea th.sortable.sorted-desc:after {
  border-width: 5px 4px 0 4px;
  border-color: #ffa07a transparent transparent transparent;
}
/* 銷案申請模塊 */
#disposalModalFooter {

}
