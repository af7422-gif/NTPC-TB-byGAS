    <!-- 登入區塊 -->

      <?!= include('ui_login'); ?>
    </div>

    <!-- 考試區塊 -->
    <div id="examSection" style="display:none;">
      <?!= include('ui_exam'); ?>
    </div>

    <!-- 主功能區塊 -->
    <div id="mainSection" style="display:none;">
      <input type="hidden" id="webAppUrl" value="<?= serviceUrl ?>">
      <?!= include('ui_main'); ?>
      <?!= include('mod_chart_base'); ?>

      <?!= include('mod_chart_exam'); ?>

    <script>

    // 顯示主頁
    function showMainSection() {
      document.body.classList.remove('login-body');
      document.body.classList.add('main-body');
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('examSection').style.display = 'none';
      document.getElementById('mainSection').style.display = '';
      // 登入後馬上先抓圖表資料
    }

    // 顯示登入頁
    function showLoginSection() {
      document.body.classList.remove('main-body');
      document.body.classList.add('login-body');
      document.getElementById('loginSection').style.display = '';
      document.getElementById('examSection').style.display = 'none';
      document.getElementById('mainSection').style.display = 'none';
    }

    // 顯示考試頁
    function showExamSection() {
      document.body.classList.remove('login-body');
      document.body.classList.add('main-body');
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('examSection').style.display = '';
      document.getElementById('mainSection').style.display = 'none';
    }
    </script>
