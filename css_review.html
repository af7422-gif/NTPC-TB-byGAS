    .modal-content {

    /* === 主按鈕與次按鈕（統一高度、留白更舒服） === */
    .custom-btn,
    .custom-btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 46px;               /* 稍微提高一點（比44更自然） */
      min-width: 48px;            /* 增加最小寬度，讓純icon不會太窄 */
      padding: 0 16px;            /* 左右留白 */
      box-sizing: border-box;
      font-weight: bold ;
      font-size: 1.1rem;
      border-radius: 0.32rem;
      margin: 2px 8px;
      cursor: pointer;
      border: none;
      transition: color 0.12s, background-color 0.12s, box-shadow 0.12s;
    }

    /* 主按鈕（橘色） */
    .custom-btn {
      color: #fff;
      background-color: #2f6b87;
      box-shadow: 0 2px 6px rgba(255, 160, 122, 0.1);
    }
    .custom-btn:hover {
      background-color: #ff8c69;
    }

    /* 次按鈕（灰色） */
    .custom-btn-secondary {

      background-color: #6c757d;
    }
    .custom-btn-secondary:hover {
      background-color: #5a6268;
    }

      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;

    /* 1. 基礎對齊設定（解決上下沒對齊的良藥） */
    .lucide-wrapper {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        vertical-align: middle;
        line-height: 0;
    }
    .lucide-wrapper svg {
        display: block;
        transition: stroke 0.2s ease, transform 0.2s ease;
    }
    /* 搜尋圖示 */
    .icon-search svg {
        width: 1.4em;
        height: 1.4em;
        stroke: #1280ff
    }
    .icon-search:hover svg {
        stroke: #1280ff; 
        transform: scale(1.1); /* 稍微放大增加互動感 */
    }

    /* 資訊圖示：圓形在視覺上會顯大，稍微調小一點點才對稱 */
    .popover-info svg {
        stroke: #08bd08;
        width: 1.4rem;
        height: 1.4rem;
        transform: translateY(-3px);
    }
    .popover-info:hover svg {
        stroke: #08bd08; 
    }

    .info-popover {
      max-width: 700px;
      //white-space: pre-wrap;
      //word-break: break-word;
    }
    /* 相機圖示 */
    .icon-camera svg {
        stroke: #orange;
        width: 1.5em;
        height: 1.4em;
    }
    .icon-camera:hover svg {
        stroke: orange;
        transform: scale(1.1);
    }
    /* 垃圾桶圖示：通常要醒目但不突兀 */
    .icon-trash svg {
        stroke: #dc3545;
        width: 1.5em;
        height: 1.3em;
    }
    .icon-trash:hover svg {
        stroke: #dc3545;
        transform: scale(1.1);
    }
    /* === 圖示與文字距離、大小統一設定 === */
    .custom-btn i,
    .custom-btn-secondary i,
    .custom-btn .material-icons,
    .custom-btn-secondary .material-icons {
      margin-right: 8px;         /* icon 與文字的距離 */

  /* === 通用審核項目行容器（不可逆、可逆、建議事項共用基礎） === */
  .review-item-row {
    display: flex;
    align-items: center;
    margin: 20px 0;
    padding: 10px 20px;
    background: #f7fbff;
    border: 1px dashed #ccc;
    border-radius: 8px;
  }
  /* === 不可逆/可逆 區塊（checklist）之間的間距與造型 === */
  .review-item-row.checklist {
    gap: 20px;  /* 控制所有元件間距 */
  }
  /* checklist 專用：氣球 icon 外觀 */
  .review-item-row.checklist .popover-info {
    font-size: 1.3rem;
    cursor: pointer;
  }
  /* checklist 專用：核取方塊大小 */
  .review-item-row.checklist input[type="checkbox"] {
    transform: scale(2.0);
  }
  /* checklist 專用：下拉選單寬度 */
  .review-item-row.checklist .form-select {
    min-width: 200px;
    max-width: 350px;
  }
  /* checklist 專用：文本欄寬度 */
  .review-item-row.checklist .review-item-input {
    border: 1px solid #e0e0e0;
    min-width: 200px;
    max-width: 900px;
    flex: 1 1 180px;
  }
  /* checklist 專用：垃圾桶 icon 樣式 */
  .review-item-row.checklist .delete-btn .material-icons {
    font-size: 26px;
    color: #e74c3c;
  }

  /* === 建議事項 區塊（suggestion）間距與造型 === */
  .review-item-row.suggestion {
    gap: 16px;  /* 建議事項間距可以小一點 */
  }
  /* suggestion 專用：核取方塊大小 */
  .review-item-row.suggestion input[type="checkbox"] {
    transform: scale(2.0);
  }
  /* suggestion 專用：文本欄寬度 */
  .review-item-row.suggestion .review-item-input {
    border: 1px solid #e0e0e0;
    min-width: 200px;
    max-width: 1000px;
    flex: 1 1 240px;
  }

  .btn-cancel {
    display: inline-flex;
